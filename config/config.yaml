scraper:
  site_name: linkedin
  locations:
    - San Francisco, CA
    - Seattle, WA
  search_term: "data scientist OR machine learning OR ai engineer OR ml engineer OR data engineer OR python OR sql"
  results_wanted: 50
  distance: 50
  is_remote: null
  hours_old: 8
  linkedin_fetch_description: true
  enforce_annual_salary: null
  description_format: markdown
  include_remote_pass: true
  remote_location_seed: United States

filters:
  hard:
    countries: [United States]
    keywords_exclude: [staff, principal, director]
    banned_companies: [Dice, Jack & Jill]
    require_us_location: true

  ideal:
    locations: [San Francisco, Remote]
    salary:
      minimum: 50000
      maximum: 200000
    max_years_experience: 3

llm:
  provider: gemini
  model: gemini-3.1-flash-lite
  max_token_batch: 200000
  batch_interval_seconds: 60

email:
  recipient: yablonskic5@gmail.com
  sender: yablonskic5@gmail.com